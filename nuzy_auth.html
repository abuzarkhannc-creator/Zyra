<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — Nuzy AI</title>
<meta name="description" content="Sign in to your Nuzy AI account and start automating customer support."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050508;--s1:#08080e;--s2:#0c0c15;--s3:#10101c;
--txt:#f5f5f7;--t2:#94949e;--t3:#5c5c6f;
--pri:#7C3AED;--pri2:#8B5CF6;--pri3:#C4B5FD;--pg:rgba(124,58,237,0.1);
--pink:#EC4899;--pink2:#F472B6;
--gn:#22c55e;--rd:#ef4444;
--b1:rgba(255,255,255,0.04);--b2:rgba(255,255,255,0.07);--b3:rgba(255,255,255,0.12);
--r:14px;--r2:20px;
--h:'Sora',sans-serif;--f:'Figtree',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--f);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.02;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.aurora{position:fixed;top:-50%;left:-20%;width:140%;height:200%;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse at 20% 50%,rgba(124,58,237,0.15),transparent 50%),
  radial-gradient(ellipse at 80% 30%,rgba(236,72,153,0.1),transparent 45%);
  animation:aurora 15s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:scale(1) rotate(0deg);opacity:.8}50%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(-1deg);opacity:.85}}

.container{position:relative;z-index:1;width:100%;max-width:460px}

.logo{text-align:center;margin-bottom:40px}
.logo-text{font-family:var(--h);font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}

.card{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid var(--b2);border-radius:var(--r2);padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)}

.tabs{display:flex;gap:8px;margin-bottom:32px;background:var(--s2);padding:4px;border-radius:12px;border:1px solid var(--b1)}
.tab{flex:1;padding:10px;text-align:center;font-family:var(--h);font-size:0.85rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all 0.3s;border:none;background:transparent;color:var(--t2)}
.tab.active{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3)}

.form-group{margin-bottom:20px}
label{display:block;font-size:0.8rem;font-weight:600;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--txt);font-family:var(--f);font-size:0.95rem;transition:all 0.2s}
input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 20px rgba(124,58,237,0.15)}
input::placeholder{color:var(--t3)}

.checkbox-group{display:flex;align-items:start;gap:10px;margin-bottom:24px}
.checkbox-group input[type="checkbox"]{width:auto;min-width:18px;height:18px;margin-top:2px;cursor:pointer}
.checkbox-group label{margin:0;font-size:0.8rem;color:var(--t2);text-transform:none;letter-spacing:normal}
.checkbox-group a{color:var(--pri3);text-decoration:none;transition:color 0.2s}
.checkbox-group a:hover{color:var(--txt)}

.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:var(--h);font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 8px 24px rgba(124,58,237,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.4)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--t3);font-size:0.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}

.social-btns{display:flex;gap:12px;margin-bottom:24px}
.btn-social{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--txt);font-family:var(--f);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-social:hover{border-color:var(--b3);background:var(--s3)}
.btn-social img{width:18px;height:18px}

.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:20px;display:none}
.error-msg.show{display:block}

.success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:20px;display:none}
.success-msg.show{display:block}

.footer{text-align:center;margin-top:24px;color:var(--t3);font-size:0.85rem}
.footer a{color:var(--pri3);text-decoration:none;transition:color 0.2s}
.footer a:hover{color:var(--txt)}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--t3);font-size:0.85rem;text-decoration:none;margin-bottom:20px;transition:color 0.2s}
.back-link:hover{color:var(--txt)}

.loading{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.form-section{display:none}
.form-section.active{display:block}
</style>
</head>
<body>
<div class="aurora"></div>

<div class="container">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to home
  </a>

  <div class="logo">
    <span class="logo-text">Nuzy AI</span>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign In</button>
      <button class="tab" data-tab="signup">Sign Up</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Sign In Form -->
    <div class="form-section active" id="signin-section">
      <form id="signin-form">
        <div class="form-group">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" placeholder="you@company.com" required/>
        </div>

        <div class="form-group">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" placeholder="••••••••" required/>
        </div>

        <div style="text-align:right;margin-bottom:20px">
          <a href="#" style="font-size:0.85rem;color:var(--pri3);text-decoration:none" id="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary">
          <span id="signin-btn-text">Sign In</span>
          <div class="loading" id="signin-loading"></div>
        </button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-btns">
        <button class="btn-social" id="google-signin">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18Z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17Z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07Z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3Z"/></svg>
          Google
        </button>
        <button class="btn-social" id="microsoft-signin">
          <svg width="18" height="18" viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#00a4ef" d="M11 0h10v10H11z"/><path fill="#7fba00" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
          Microsoft
        </button>
      </div>
    </div>

    <!-- Sign Up Form -->
    <div class="form-section" id="signup-section">
      <form id="signup-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe" required/>
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@company.com" required/>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="At least 8 characters" required minlength="8"/>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required/>
          <label for="terms">I agree to the <a href="nuzy_terms.html" target="_blank">Terms</a> and <a href="nuzy_privacy.html" target="_blank">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn btn-primary">
          <span id="signup-btn-text">Create Account</span>
          <div class="loading" id="signup-loading"></div>
        </button>
      </form>

      <div class="divider">or sign up with</div>

      <div class="social-btns">
        <button class="btn-social" id="google-signup">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18Z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17Z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07Z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3Z"/></svg>
          Google
        </button>
        <button class="btn-social" id="microsoft-signup">
          <svg width="18" height="18" viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#00a4ef" d="M11 0h10v10H11z"/><path fill="#7fba00" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
          Microsoft
        </button>
      </div>
    </div>

    <div class="footer" id="footer-text">
      Don't have an account? <a href="#" class="switch-tab" data-target="signup">Sign up</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Initialize Supabase client
const SUPABASE_URL = 'https://qobsbbfjjgwgfmgxwinn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvYnNiYmZqamd3Z2ZtZ3h3aW5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMzMDIwOTUsImV4cCI6MjAyODg3ODA5NX0.3lQP7KvI5zYXwq6xBNOjB5EsZ0IKZQyDUwDV2KqDVkM';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Tab switching
const tabs = document.querySelectorAll('.tab');
const sections = document.querySelectorAll('.form-section');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    switchTab(target);
  });
});

document.querySelectorAll('.switch-tab').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const target = e.target.dataset.target;
    switchTab(target);
  });
});

function switchTab(target) {
  tabs.forEach(t => t.classList.remove('active'));
  sections.forEach(s => s.classList.remove('active'));
  
  document.querySelector(`[data-tab="${target}"]`).classList.add('active');
  document.getElementById(`${target}-section`).classList.add('active');
  
  if (target === 'signup') {
    document.getElementById('footer-text').innerHTML = 'Already have an account? <a href="#" class="switch-tab" data-target="signin">Sign in</a>';
  } else {
    document.getElementById('footer-text').innerHTML = 'Don\'t have an account? <a href="#" class="switch-tab" data-target="signup">Sign up</a>';
  }
  
  document.querySelectorAll('.switch-tab').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      switchTab(e.target.dataset.target);
    });
  });
  
  hideMessage();
}

// Error/Success message handling
function showError(msg) {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = msg;
  errorEl.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

function showSuccess(msg) {
  const successEl = document.getElementById('successMsg');
  successEl.textContent = msg;
  successEl.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}

function hideMessage() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}

// Sign In
document.getElementById('signin-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessage();
  
  const email = document.getElementById('signin-email').value;
  const password = document.getElementById('signin-password').value;
  const btnText = document.getElementById('signin-btn-text');
  const loading = document.getElementById('signin-loading');
  
  btnText.style.display = 'none';
  loading.style.display = 'block';
  
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password,
    });
    
    if (error) throw error;
    
    showSuccess('Signed in successfully! Redirecting...');
    setTimeout(() => {
      window.location.href = '/onboarding.html'; // We'll create this next
    }, 1000);
    
  } catch (error) {
    showError(error.message || 'Failed to sign in. Please try again.');
    btnText.style.display = 'block';
    loading.style.display = 'none';
  }
});

// Sign Up
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessage();
  
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const terms = document.getElementById('terms').checked;
  const btnText = document.getElementById('signup-btn-text');
  const loading = document.getElementById('signup-loading');
  
  if (!terms) {
    showError('Please agree to the Terms and Privacy Policy');
    return;
  }
  
  btnText.style.display = 'none';
  loading.style.display = 'block';
  
  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: {
          full_name: name,
        }
      }
    });
    
    if (error) throw error;
    
    showSuccess('Account created! Please check your email to confirm your address.');
    
    // Clear form
    document.getElementById('signup-form').reset();
    btnText.style.display = 'block';
    loading.style.display = 'none';
    
  } catch (error) {
    showError(error.message || 'Failed to create account. Please try again.');
    btnText.style.display = 'block';
    loading.style.display = 'none';
  }
});

// Google Sign In
document.getElementById('google-signin').addEventListener('click', async () => {
  try {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: `${window.location.origin}/onboarding.html`
      }
    });
    if (error) throw error;
  } catch (error) {
    showError('Failed to sign in with Google');
  }
});

document.getElementById('google-signup').addEventListener('click', async () => {
  try {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: `${window.location.origin}/onboarding.html`
      }
    });
    if (error) throw error;
  } catch (error) {
    showError('Failed to sign up with Google');
  }
});

// Microsoft Sign In
document.getElementById('microsoft-signin').addEventListener('click', async () => {
  try {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'azure',
      options: {
        redirectTo: `${window.location.origin}/onboarding.html`
      }
    });
    if (error) throw error;
  } catch (error) {
    showError('Failed to sign in with Microsoft');
  }
});

document.getElementById('microsoft-signup').addEventListener('click', async () => {
  try {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'azure',
      options: {
        redirectTo: `${window.location.origin}/onboarding.html`
      }
    });
    if (error) throw error;
  } catch (error) {
    showError('Failed to sign up with Microsoft');
  }
});

// Forgot Password
document.getElementById('forgot-password').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = prompt('Enter your email address:');
  
  if (email) {
    try {
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/reset-password.html`,
      });
      
      if (error) throw error;
      showSuccess('Password reset email sent! Check your inbox.');
    } catch (error) {
      showError('Failed to send reset email');
    }
  }
});

// Check if user is already logged in
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    window.location.href = '/onboarding.html';
  }
});
</script>
</body>
</html>
