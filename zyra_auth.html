<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — Nuzy AI</title>
<meta name="description" content="Sign in to your Nuzy AI account and start automating customer support."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050508;--s1:#08080e;--s2:#0c0c15;--s3:#10101c;
--txt:#f5f5f7;--t2:#94949e;--t3:#5c5c6f;
--pri:#7C3AED;--pri2:#8B5CF6;--pri3:#C4B5FD;--pg:rgba(124,58,237,0.1);
--pink:#EC4899;--pink2:#F472B6;
--gn:#22c55e;--rd:#ef4444;
--b1:rgba(255,255,255,0.04);--b2:rgba(255,255,255,0.07);--b3:rgba(255,255,255,0.12);
--r:14px;--r2:20px;
--h:'Sora',sans-serif;--f:'Figtree',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--f);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.02;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.aurora{position:fixed;top:-50%;left:-20%;width:140%;height:200%;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse at 20% 50%,rgba(124,58,237,0.15),transparent 50%),
  radial-gradient(ellipse at 80% 30%,rgba(236,72,153,0.1),transparent 45%);
  animation:aurora 15s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:scale(1) rotate(0deg);opacity:.8}50%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(-1deg);opacity:.85}}

.container{position:relative;z-index:1;width:100%;max-width:460px}

.logo{text-align:center;margin-bottom:40px}
.logo-text{font-family:var(--h);font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.logo-badge{font-size:0.5rem;background:linear-gradient(135deg,var(--pri),var(--pink));padding:2px 8px;border-radius:100px;color:#fff;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-left:8px}

.card{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid var(--b2);border-radius:var(--r2);padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)}

.tabs{display:flex;gap:8px;margin-bottom:32px;background:var(--s2);padding:4px;border-radius:12px;border:1px solid var(--b1)}
.tab{flex:1;padding:10px;text-align:center;font-family:var(--h);font-size:0.85rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all 0.3s;border:none;background:transparent;color:var(--t2)}
.tab.active{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3)}

.form-group{margin-bottom:20px}
label{display:block;font-size:0.8rem;font-weight:600;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--txt);font-family:var(--f);font-size:0.95rem;transition:all 0.2s}
input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 20px rgba(124,58,237,0.15)}
input::placeholder{color:var(--t3)}

.checkbox-group{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.checkbox{width:18px;height:18px;border-radius:4px;border:1px solid var(--b2);background:var(--s2);cursor:pointer;appearance:none;position:relative;transition:all 0.2s}
.checkbox:checked{background:linear-gradient(135deg,var(--pri),var(--pink));border-color:var(--pri)}
.checkbox:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:0.7rem;font-weight:700}
.checkbox-label{font-size:0.85rem;color:var(--t2);cursor:pointer}

.btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:var(--h);font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.25)}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.3s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.4),0 0 40px rgba(236,72,153,0.3)}
.btn-primary:hover::before{opacity:1}

.divider{display:flex;align-items:center;gap:16px;margin:28px 0;color:var(--t3);font-size:0.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}

.social-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--b2);background:rgba(255,255,255,0.02);color:var(--t2);font-family:var(--f);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.social-btn:hover{border-color:var(--pri);background:rgba(124,58,237,0.05);color:var(--txt)}
.social-icon{width:20px;height:20px}

.link{color:var(--pri3);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
.link:hover{color:var(--txt)}

.text-center{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--t2)}

.error{display:none;padding:12px 16px;border-radius:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-size:0.8rem;margin-bottom:20px}
.error.show{display:block}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--t2);font-size:0.85rem;text-decoration:none;margin-bottom:24px;transition:color 0.2s}
.back-link:hover{color:var(--txt)}

@media(max-width:600px){
.card{padding:28px 24px}
.logo{margin-bottom:32px}
}
</style>
</head>
<body>
<div class="aurora"></div>

<div class="container">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to home
  </a>

  <div class="logo">
    <span class="logo-text">Nuzy AI</span>
    <span class="logo-badge">Beta</span>
  </div>

  <div class="card">
    <!-- Error Message -->
    <div class="error" id="errorMsg"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('signin')">Sign In</button>
      <button class="tab" onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Form -->
    <form id="signinForm" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signinEmail" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signinPassword" placeholder="Enter your password" required/>
      </div>
      <div style="text-align:right;margin-bottom:24px">
        <a href="#" class="link" onclick="showForgotPassword(event)">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signupForm" style="display:none" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a strong password" required minlength="8"/>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="agreeTerms" class="checkbox" required/>
        <label for="agreeTerms" class="checkbox-label">I agree to the <a href="nuzy_terms.html" class="link" target="_blank">Terms</a> and <a href="nuzy_privacy.html" class="link" target="_blank">Privacy Policy</a></label>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <!-- Social Login -->
    <div class="divider">OR</div>
    <button class="social-btn" onclick="handleGoogleAuth()">
      <svg class="social-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button class="social-btn" onclick="handleMicrosoftAuth()">
      <svg class="social-icon" viewBox="0 0 24 24"><path fill="#F25022" d="M11.5 11.5H3v-8.5h8.5z"/><path fill="#00A4EF" d="M21 11.5h-8.5v-8.5H21z"/><path fill="#7FBA00" d="M11.5 21H3v-8.5h8.5z"/><path fill="#FFB900" d="M21 21h-8.5v-8.5H21z"/></svg>
      Continue with Microsoft
    </button>

    <!-- Footer Text -->
    <div class="text-center">
      <span id="footerText">Don't have an account? <a href="#" class="link" onclick="showTab('signup');return false">Sign up</a></span>
    </div>
  </div>
</div>

<script>
function showTab(tab) {
  const tabs = document.querySelectorAll('.tab');
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const footerText = document.getElementById('footerText');
  const errorMsg = document.getElementById('errorMsg');
  
  errorMsg.classList.remove('show');
  
  tabs.forEach(t => t.classList.remove('active'));
  
  if (tab === 'signin') {
    tabs[0].classList.add('active');
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    footerText.innerHTML = 'Don\'t have an account? <a href="#" class="link" onclick="showTab(\'signup\');return false">Sign up</a>';
  } else {
    tabs[1].classList.add('active');
    signinForm.style.display = 'none';
    signupForm.style.display = 'block';
    footerText.innerHTML = 'Already have an account? <a href="#" class="link" onclick="showTab(\'signin\');return false">Sign in</a>';
  }
}

function showError(message) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = message;
  errorMsg.classList.add('show');
}

function handleSignIn(event) {
  event.preventDefault();
  const email = document.getElementById('signinEmail').value;
  const password = document.getElementById('signinPassword').value;
  
  // TODO: Replace with actual Supabase authentication
  console.log('Sign in attempt:', { email, password });
  
  // Temporary: Show success message
  showError('Authentication not yet implemented. This will connect to Supabase in Phase 3.');
  
  // After successful auth, redirect to onboarding:
  // window.location.href = 'nuzy_onboarding.html';
}

function handleSignUp(event) {
  event.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const agreed = document.getElementById('agreeTerms').checked;
  
  if (!agreed) {
    showError('Please agree to the Terms and Privacy Policy');
    return;
  }
  
  // TODO: Replace with actual Supabase authentication
  console.log('Sign up attempt:', { name, email, password });
  
  // Temporary: Show success message
  showError('Authentication not yet implemented. This will connect to Supabase in Phase 3.');
  
  // After successful signup, redirect to onboarding:
  // window.location.href = 'nuzy_onboarding.html';
}

function handleGoogleAuth() {
  // TODO: Implement Google OAuth with Supabase
  console.log('Google auth requested');
  showError('Google authentication will be implemented in Phase 3.');
}

function handleMicrosoftAuth() {
  // TODO: Implement Microsoft OAuth with Supabase
  console.log('Microsoft auth requested');
  showError('Microsoft authentication will be implemented in Phase 3.');
}

function showForgotPassword(event) {
  event.preventDefault();
  const email = prompt('Enter your email address to reset your password:');
  if (email) {
    // TODO: Implement password reset with Supabase
    console.log('Password reset requested for:', email);
    showError('Password reset will be implemented in Phase 3. Check your email for instructions.');
  }
}
</script>
</body>
</html>
